name: Continuous Integration
on: 
  push:
    paths-ignore: 'README.md'
  pull_request:
    types: [opened, reopened]
    paths-ignore: 'README.md'

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: docker build --target test --tag todo-app:test .
    - run: docker run todo-app:test

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - run: docker build --target dependency-check --tag todo-app:dependency-check .
    - run: docker run todo-app:dependency-check
  
  push-and-deploy:
    name: Push to Docker Hub and deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/exercise-12'}}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID}}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET}}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID}}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID}}
    steps: 
    - uses: actions/checkout@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2
    - run: docker build --target production --tag katielht/todo-app:prod .
    - run: docker push katielht/todo-app:prod
    - run: curl -dH -X POST '${{ secrets.AZURE_WEBHOOK }}'
    - run: terraform init
    - run: terraform apply -auto-approve -var 'prefix=katlin-tf' -var 'OAUTH_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}' -var 'OAUTH_CLIENT_SECRET=${{ secrets.OAUTH_CLIENT_SECRET }}'
    - run: curl -dH -X POST "$(terraform output -raw webhook_url)"




